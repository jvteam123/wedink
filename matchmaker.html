<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maezku Ladder Has Moved</title>
  <link rel="canonical" href="https://mladder.vercel.app/">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11151A;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    .box { padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #aab1bb; margin-top: 0; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: #4fd1c5;
      color: #11151A;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <h1>We've moved!</h1>
    <p>Maezku Ladder now lives at a new address.</p>
    <a class="btn" href="https://mladder.vercel.app/">Go to Maezku Ladder</a>
  </div>
</body>
</html>
