<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#11151A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchen Ladder">
<meta name="format-detection" content="telephone=no">
<title>Kitchen Ladder — Pickleball 2v2 Matchmaker</title>
<style>
/* ============================================================
   KITCHEN LADDER — design tokens
   Subject: pickleball open-play, single-court rotation.
   Palette = night court: charcoal-navy court surface, optic-yellow
   ball accent, court-blue secondary, win/loss signal colors.
   Type = system sans for UI copy, tabular monospace for every
   score/stat/rating digit (scoreboard ticker feel), bold uppercase
   wide-tracking system sans standing in for a condensed display face.
   Signature = the Current Match "scoreboard" card with a dashed
   center kitchen-line divider between Team A and Team B.
   ============================================================ */
:root{
  --bg:#11151A;
  --surface:#181E25;
  --surface-2:#1F2730;
  --surface-3:#27313C;
  --line:#2A333E;
  --line-soft:#1F2730;
  --ball:#D7F23D;       /* optic yellow — primary accent */
  --ball-dim:#9CAE2C;
  --court:#4FA8FF;      /* court blue — secondary accent */
  --court-dim:#2E6CB0;
  --win:#3ED598;
  --win-dim:#1F6B4C;
  --loss:#FF6B6B;
  --loss-dim:#8C3636;
  --text:#F1F4F0;
  --text-dim:#9AA5B1;
  --text-faint:#5C6873;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
  --shadow-1:0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px -12px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  height:100%;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  overscroll-behavior-y:none;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
button{
  font-family:inherit; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none; user-select:none;
}
input,select,textarea{touch-action:manipulation; -webkit-tap-highlight-color:transparent;}
.eyebrow{
  font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-faint);
}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}
.scroll-hide::-webkit-scrollbar{display:none;}
.scroll-hide{scrollbar-width:none;}

/* ---------- App shell ---------- */
#app{
  max-width:560px; margin:0 auto; min-height:100vh; min-height:100dvh; position:relative;
  display:flex; flex-direction:column; padding-bottom:96px;
}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(180deg, rgba(17,21,26,0.98) 70%, rgba(17,21,26,0.85));
  backdrop-filter:blur(8px);
  padding:14px 16px 8px;
  border-bottom:1px solid var(--line-soft);
}
.brand-row{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px; height:34px; border-radius:10px; flex:none;
  background:var(--surface-2); display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-1);
}
.brand-name{
  font-weight:800; letter-spacing:0.02em; font-size:17px; line-height:1.1;
}
.brand-name b{color:var(--ball);}
.brand-sub{font-size:11px; color:var(--text-faint); margin-top:1px;}
.dash-strip{
  display:flex; gap:14px; margin-top:10px; font-size:12px; color:var(--text-dim);
  overflow-x:auto; padding-bottom:2px;
}
.dash-strip .d-item{display:flex; align-items:baseline; gap:5px; flex:none; white-space:nowrap;}
.dash-strip .d-item .v{font-family:var(--font-mono); color:var(--text); font-weight:700; font-size:13px;}

/* ---------- Tab nav ---------- */
.tabs{
  display:flex; gap:6px; overflow-x:auto; padding:10px 16px; scroll-snap-type:x proximate;
  background:var(--bg);
  position:sticky; top:var(--topbar-h, 72px); z-index:29;
  border-bottom:1px solid var(--line-soft);
}
.tab-btn{
  flex:none; display:flex; align-items:center; gap:6px;
  background:transparent; border:1px solid transparent; color:var(--text-dim);
  padding:8px 12px; border-radius:999px; font-size:13px; font-weight:600;
  cursor:pointer; transition:background .15s,color .15s,border-color .15s;
  scroll-snap-align:start;
}
.tab-btn svg{width:15px;height:15px;flex:none;}
.tab-btn.active{background:var(--surface-2); color:var(--ball); border-color:var(--line);}
.tab-btn:active{transform:scale(0.97);}

/* ---------- Content ---------- */
.view{padding:14px 16px 12px; animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
.section-title{
  font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;
  color:var(--text-dim); margin:18px 2px 8px;
}
.section-title:first-child{margin-top:2px;}

/* ---------- Cards ---------- */
.card{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius-lg);
  padding:16px; box-shadow:var(--shadow-1);
}
.card + .card{margin-top:10px;}
.card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.empty-state{
  text-align:center; padding:36px 16px; color:var(--text-faint);
}
.empty-state .big{font-size:30px; margin-bottom:6px;}
.empty-state p{margin:4px 0 0; font-size:13px; line-height:1.5;}
.empty-state .et{font-weight:700; color:var(--text-dim); font-size:14px;}

/* ---------- Buttons ---------- */
.btn{
  appearance:none; border:none; border-radius:var(--radius-md); padding:12px 16px;
  font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center;
  justify-content:center; gap:6px; transition:transform .08s ease, filter .15s ease, opacity .15s;
  user-select:none;
}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--ball); color:#10150a;}
.btn-primary:hover{filter:brightness(1.06);}
.btn-secondary{background:var(--surface-2); color:var(--text); border:1px solid var(--line);}
.btn-court{background:var(--court); color:#08131f;}
.btn-ghost{background:transparent; color:var(--text-dim); border:1px solid var(--line);}
.btn-danger{background:transparent; color:var(--loss); border:1px solid var(--loss-dim);}
.btn-sm{padding:8px 12px; font-size:12.5px; border-radius:var(--radius-sm);}
.btn-block{width:100%;}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);
  color:var(--text-dim); display:flex;align-items:center;justify-content:center; cursor:pointer; flex:none;
}
.icon-btn:active{transform:scale(0.93);}
.icon-btn svg{width:16px;height:16px;}
.icon-btn-tiny{
  width:32px;height:32px;min-width:32px;border-radius:9px;background:transparent;
  border:1px solid var(--line-soft); color:var(--text-faint); display:inline-flex;
  align-items:center;justify-content:center; cursor:pointer; flex:none; vertical-align:middle;
}
.icon-btn-tiny:active{transform:scale(0.92); background:var(--surface-2); color:var(--text-dim);}
.icon-btn-tiny svg{width:14px;height:14px;}

/* ---------- Forms ---------- */
.field{margin-bottom:10px;}
.field label{display:block; font-size:11.5px; color:var(--text-faint); margin-bottom:5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
input[type=text],input[type=number],textarea,select{
  width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text);
  padding:11px 12px; border-radius:var(--radius-sm); font-size:16px; font-family:inherit;
  outline:none; transition:border-color .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--court);}
textarea{resize:vertical; min-height:90px; font-family:var(--font-mono); font-size:13px;}
.input-row{display:flex; gap:8px;}
.input-row > *{flex:1;}
.toggle-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line-soft);}
.toggle-row:last-child{border-bottom:none;}
.toggle-row .t-label{font-size:13.5px; font-weight:600;}
.toggle-row .t-hint{font-size:11.5px; color:var(--text-faint); margin-top:2px;}
.switch{position:relative; width:42px; height:24px; flex:none; cursor:pointer;}
.switch input{position:absolute; opacity:0; inset:0; margin:0; cursor:pointer;}
.switch .track{position:absolute; inset:0; background:var(--surface-3); border:1px solid var(--line); border-radius:999px; transition:background .15s;}
.switch .thumb{position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--text-dim); transition:transform .15s, background .15s;}
.switch input:checked + .track{background:var(--win-dim); border-color:var(--win);}
.switch input:checked + .track + .thumb{transform:translateX(18px); background:var(--win);}

/* ---------- Player list ---------- */
.player-row{
  display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line-soft);
}
.player-row:last-child{border-bottom:none;}
.avatar{
  width:36px;height:36px;border-radius:10px; background:var(--surface-3); color:var(--ball);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex:none;
}
.player-row .pinfo{flex:1; min-width:0;}
.player-row .pname{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.player-row .pmeta{font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono); margin-top:2px;}
.pill{
  display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px;
  font-weight:700; font-family:var(--font-mono);
}
.pill-paused{background:var(--surface-3); color:var(--text-faint);}
.pill-active{background:rgba(215,242,61,0.12); color:var(--ball);}
.row-actions{display:flex; gap:6px; flex:none;}

/* ---------- Scoreboard (signature element) ---------- */
.scoreboard{
  background:radial-gradient(circle at 30% -10%, rgba(79,168,255,0.10), transparent 55%), var(--surface);
  border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-1);
}
.scoreboard + .scoreboard { margin-top: 14px; }
.sb-head{
  display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
  border-bottom:1px solid var(--line-soft);
}
.sb-round{font-family:var(--font-mono); font-weight:800; font-size:13px; letter-spacing:.04em; color:var(--text-dim);}
.sb-round b{color:var(--ball); font-size:15px;}
.live-dot{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--win); text-transform:uppercase; letter-spacing:.08em;}
.live-dot .d{width:7px;height:7px;border-radius:50%;background:var(--win); box-shadow:0 0 0 0 rgba(62,213,152,.6); animation:pulse 1.6s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(62,213,152,.45);}70%{box-shadow:0 0 0 8px rgba(62,213,152,0);}100%{box-shadow:0 0 0 0 rgba(62,213,152,0);}}
.sb-body{display:flex; position:relative;}
.sb-team{flex:1; padding:16px 14px; display:flex; flex-direction:column; gap:10px; min-width:0;}
.sb-team.team-a{align-items:flex-end; text-align:right;}
.sb-team.team-b{align-items:flex-start; text-align:left;}
.sb-divider{
  width:0; border-left:2px dashed var(--line); position:relative; flex:none;
}
.sb-divider::after{
  content:"KITCHEN"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg);
  font-size:9px; letter-spacing:.18em; color:var(--text-faint); background:var(--surface); padding:3px 0; white-space:nowrap;
}
.sb-tag{font-size:10.5px; font-weight:800; letter-spacing:.12em; color:var(--court); text-transform:uppercase;}
.sb-team.team-a .sb-tag{color:var(--ball);}
.sb-names{font-weight:800; font-size:16px; line-height:1.3; word-break:break-word; overflow-wrap:anywhere;}
.sb-rating{font-family:var(--font-mono); font-size:12px; color:var(--text-faint);}
.sb-winbtn{width:100%; margin-top:2px;}
.sb-foot{padding:12px 16px; border-top:1px solid var(--line-soft); display:flex; gap:8px;}
.sb-foot .btn{flex:1;}

/* ---------- Sticky control bar ---------- */
.controlbar{
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  display:flex; justify-content:center;
}
.controlbar-inner{
  width:100%; max-width:560px; background:var(--surface); border-top:1px solid var(--line);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 24px -8px rgba(0,0,0,.5);
}
.cb-top{display:flex; gap:8px;}
.cb-top .btn{flex:1; padding:13px 10px; font-size:13px;}
.cb-top .btn .nm{display:block; font-family:var(--font-mono); font-weight:600; font-size:10.5px; opacity:.85; margin-top:1px;}
.cb-bottom{display:flex; gap:8px; margin-top:8px;}
.cb-bottom .btn{flex:1;}
.cb-top .btn svg, .cb-bottom .btn svg{width:16px; height:16px; flex:none;}

/* ---------- Queue ---------- */
.queue-row{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line-soft);}
.queue-row:last-child{border-bottom:none;}
.qrank{
  width:24px;height:24px;border-radius:50%; background:var(--surface-3); color:var(--text-dim);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; font-family:var(--font-mono); flex:none;
}
.queue-row .qmeta{font-size:11px; color:var(--text-faint); font-family:var(--font-mono);}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint);
  padding:0 8px 8px; font-weight:700; white-space:nowrap;
}
td{padding:9px 8px; border-top:1px solid var(--line-soft); white-space:nowrap; font-family:var(--font-mono); font-size:12.5px;}
td.namecell{font-family:var(--font-ui); font-weight:700; font-size:13px; white-space:normal;}
tr.rank-1 .rankbadge{color:var(--ball);}
.rankbadge{font-weight:800;}
.txt-win{color:var(--win); font-weight:700;}
.txt-loss{color:var(--loss); font-weight:700;}
.streak-chip{padding:2px 7px; border-radius:999px; font-size:11px; font-weight:800;}
.streak-w{background:rgba(62,213,152,.12); color:var(--win);}
.streak-l{background:rgba(255,107,107,.12); color:var(--loss);}
.streak-0{background:var(--surface-3); color:var(--text-faint);}
.sort-bar{display:flex; gap:6px; overflow-x:auto; margin-bottom:10px;}
.sort-chip{
  flex:none; font-size:12px; padding:6px 11px; border-radius:999px; background:var(--surface-2);
  border:1px solid var(--line); color:var(--text-dim); cursor:pointer; font-weight:600;
}
.sort-chip.active{background:rgba(215,242,61,.12); color:var(--ball); border-color:var(--ball-dim);}

/* ---------- History ---------- */
.hist-item{padding:12px 4px; border-bottom:1px solid var(--line-soft);}
.hist-item:last-child{border-bottom:none;}
.hist-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.hist-round{font-family:var(--font-mono); font-size:11px; color:var(--text-faint);}
.hist-teams{display:flex; align-items:center; gap:8px; font-size:13.5px;}
.hist-team{flex:1; min-width:0;}
.hist-team.winner{color:var(--win); font-weight:800;}
.hist-team.loser{color:var(--text-dim);}
.hist-vs{color:var(--text-faint); font-size:11px; font-family:var(--font-mono); flex:none;}

/* ---------- Toast ---------- */
#toast-root{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:90; display:flex; flex-direction:column; gap:8px; align-items:center; width:100%; max-width:560px; padding:0 16px; pointer-events:none;}
.toast{
  background:var(--surface-3); border:1px solid var(--line); color:var(--text); padding:10px 16px;
  border-radius:999px; font-size:13px; font-weight:600; box-shadow:0 8px 20px -6px rgba(0,0,0,.5);
  animation:toastIn .25s ease, toastOut .25s ease 2.2s forwards; max-width:100%;
}
@keyframes toastIn{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:none;}}
@keyframes toastOut{to{opacity:0; transform:translateY(-8px);}}

/* ---------- Modal ---------- */
.modal-bg{position:fixed; inset:0; background:rgba(8,10,13,.7); z-index:80; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn .15s ease;}
.modal-sheet{
  width:100%; max-width:560px; background:var(--surface); border-radius:20px 20px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  max-height:85vh; overflow-y:auto; animation:sheetUp .2s ease;
  border-top:1px solid var(--line);
}
@keyframes sheetUp{from{transform:translateY(24px);} to{transform:none;}}
.modal-title{font-size:16px; font-weight:800; margin:0 0 4px;}
.modal-sub{font-size:12.5px; color:var(--text-faint); margin:0 0 14px;}
.modal-actions{display:flex; gap:8px; margin-top:14px;}
.modal-actions .btn{flex:1;}

/* ---------- Misc ---------- */
.helper-text{font-size:12px; color:var(--text-faint); line-height:1.5; margin:4px 2px 0;}
.divider-thin{height:1px; background:var(--line-soft); margin:14px 0;}
.flex-between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.stat-box{background:var(--surface-2); border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:10px; text-align:center;}
.stat-box .sv{font-family:var(--font-mono); font-weight:800; font-size:17px; color:var(--ball);}
.stat-box .sl{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;}
.badge-count{
  background:var(--ball); color:#10150a; font-size:10px; font-weight:800; border-radius:999px;
  min-width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; padding:0 4px;
}
@media (min-width:560px){
  .topbar,.tabs,.controlbar-inner{border-radius:0;}
}
@media (max-width:380px){
  .sb-team{padding:13px 9px;}
  .sb-names{font-size:14.5px;}
  .sb-rating{font-size:11px;}
  .sb-tag{font-size:10px;}
  .cb-score-input{width:62px; font-size:19px;}
  .rr-score-input{width:48px; font-size:16px; padding:6px 2px;}
  .scoreboard .btn-sm{font-size:12px; padding:8px 8px;}
  .dash-strip{gap:10px;}
  .queue-row .qmeta, .queue-row > div{font-size:12.5px;}
}

/* ---------- Control bar score input ---------- */
.cb-score-row{
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
}
.cb-score-team{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
}
.cb-score-label{
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:100%; text-align:center;
}
.cb-score-input{
  width:70px; background:var(--surface-3); border:1px solid var(--line); color:var(--text);
  padding:8px 6px; border-radius:var(--radius-sm); font-size:22px; font-family:var(--font-mono);
  font-weight:800; text-align:center; outline:none; transition:border-color .15s;
  -webkit-appearance:none; appearance:none;
}
.cb-score-input:focus{border-color:var(--ball);}
.rr-score-input{width:56px; padding:7px 4px; font-size:17px;}
.cb-score-vs{
  font-size:16px; font-weight:800; color:var(--text-faint); font-family:var(--font-mono);
  flex:none; padding-top:18px;
}

/* ---------- Radio List Buttons ---------- */
.radio-group-mode {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.radio-box-btn {
  flex: 1; background: var(--surface-2); border: 1px solid var(--line); padding: 12px; text-align: center; border-radius: var(--radius-md); cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--text-dim); transition: all 0.15s;
}
.radio-box-btn.active {
  background: rgba(215,242,61,0.1); border-color: var(--ball); color: var(--ball);
}

</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand-row">
      <div class="brand-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#D7F23D" stroke-width="2"/><circle cx="9" cy="9" r="1" fill="#D7F23D"/><circle cx="14" cy="8.5" r="1" fill="#D7F23D"/><circle cx="15.5" cy="13" r="1" fill="#D7F23D"/><circle cx="10.5" cy="15" r="1" fill="#D7F23D"/></svg>
      </div>
      <div>
        <div class="brand-name">Kitchen <b>Ladder</b></div>
        <div class="brand-sub">Open-play matchmaking with Multi-Mode systems</div>
      </div>
    </div>
    <div class="dash-strip scroll-hide" id="dashStrip"></div>
  </div>

  <nav class="tabs scroll-hide" id="tabNav"></nav>

  <main class="view" id="view"></main>

</div>

<div id="toast-root"></div>
<div id="modal-root"></div>

<script>
(function(){
"use strict";

/* ============================================================
   STORAGE KEYS
   ============================================================ */
const KEYS = {
  players:'kl_players', matches:'kl_matches', current:'kl_current',
  settings:'kl_settings', round:'kl_round', undo:'kl_undo', tab:'kl_tab'
};

const DEFAULT_SETTINGS = {
  matchMode: 'Rotation', // 'Rotation' or 'RoundRobin'
  numCourts: 1,
  winnerVsWinner: true,
  equalPlayPriority: true,
  smartBalance: true,
  maxRepeatTeammates: 2,
  maxRepeatOpponents: 3
};

/* ============================================================
   STATE — loaded once at boot, persisted after every mutation
   ============================================================ */
let state = {
  players: [],
  matches: [],
  current: null,         // Rotation: { round, teamA:[id,id], teamB:[id,id] }
  currentGeneration: null, // RoundRobin: { generation, courts:[ { court, teamA:[id,id], teamB:[id,id], scoreA:null, scoreB:null, winner:null } ] }
  settings: { ...DEFAULT_SETTINGS },
  round: 0,
  undo: null,
  tab: 'match'
};

function loadState(){
  try{
    const p = localStorage.getItem(KEYS.players);
    const m = localStorage.getItem(KEYS.matches);
    const c = localStorage.getItem(KEYS.current);
    const s = localStorage.getItem(KEYS.settings);
    const r = localStorage.getItem(KEYS.round);
    const u = localStorage.getItem(KEYS.undo);
    const t = localStorage.getItem(KEYS.tab);
    if(p) state.players = JSON.parse(p);
    if(m) state.matches = JSON.parse(m);
    if(c) {
      const parsedC = JSON.parse(c);
      if (parsedC && parsedC.matches) {
        state.currentGeneration = parsedC;
        state.current = null;
      } else {
        state.current = parsedC;
        state.currentGeneration = null;
      }
    }
    if(s) state.settings = { ...DEFAULT_SETTINGS, ...JSON.parse(s) };
    if(r) state.round = parseInt(r,10)||0;
    if(u) state.undo = JSON.parse(u);
    if(t) state.tab = t;
  }catch(e){
    console.error('Failed to load saved data, starting fresh.', e);
  }
}

function saveAll(){
  try{
    localStorage.setItem(KEYS.players, JSON.stringify(state.players));
    localStorage.setItem(KEYS.matches, JSON.stringify(state.matches));
    const currentSnapshot = state.settings.matchMode === 'RoundRobin' ? state.currentGeneration : state.current;
    localStorage.setItem(KEYS.current, JSON.stringify(currentSnapshot));
    localStorage.setItem(KEYS.settings, JSON.stringify(state.settings));
    localStorage.setItem(KEYS.round, String(state.round));
    localStorage.setItem(KEYS.undo, JSON.stringify(state.undo));
    localStorage.setItem(KEYS.tab, state.tab);
  }catch(e){
    toast('Storage error — data may not have saved.');
    console.error(e);
  }
}

/* ============================================================
   UTILITIES
   ============================================================ */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function esc(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(name){
  const parts = name.trim().split(/\s+/);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function getPlayer(id){ return state.players.find(p=>p.id===id); }
function playerName(id){ const p = getPlayer(id); return p ? p.name : '—'; }
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function toast(msg){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 2500);
}

function closeModal(){
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
}
function openModal(html){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" data-action="modal-close">
    <div class="modal-sheet">${html}</div>
  </div>`;
}

/* ============================================================
   PLAYER MODEL HELPERS
   ============================================================ */
function newPlayer(name){
  return {
    id: uid('p'),
    name: name.trim(),
    active: true,
    gamesPlayed: 0,
    wins: 0,
    losses: 0,
    rating: 1000,
    currentStreak: 0,     // signed: + win streak, - loss streak
    longestStreak: 0,
    sitOuts: 0,
    consecutiveSitOuts: 0,
    sitOutPriority: 0,    // RoundRobin support
    waitingRounds: 0,     // RoundRobin support
    results: [],          // chronological 'W'/'L'
    teammates: {},         // id -> count
    opponents: {},          // id -> count
    createdAt: new Date().toISOString()
  };
}

function winPct(p){
  if(p.gamesPlayed===0) return 0;
  return Math.round((p.wins/p.gamesPlayed)*1000)/10;
}

function pairCount(map, id){ return map[id]||0; }
function bumpPair(map, id){ map[id] = (map[id]||0)+1; }

/* ============================================================
   PLAYER MANAGEMENT ACTIONS
   ============================================================ */
function addPlayer(name){
  name = (name||'').trim();
  if(!name){ toast('Enter a name first.'); return; }
  if(state.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){
    toast('A player with that name already exists.'); return;
  }
  state.players.push(newPlayer(name));
  saveAll(); renderAll();
  toast(`Added ${name}.`);
}

function bulkImport(text){
  const names = text.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
  if(!names.length){ toast('Paste at least one name.'); return; }
  let added = 0, skipped = 0;
  names.forEach(name=>{
    if(state.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){ skipped++; return; }
    state.players.push(newPlayer(name));
    added++;
  });
  saveAll(); renderAll(); closeModal();
  toast(`Imported ${added} player${added!==1?'s':''}${skipped?`, skipped ${skipped} duplicate${skipped!==1?'s':''}`:''}.`);
}

function editPlayerName(id, name){
  name = (name||'').trim();
  if(!name){ toast('Name cannot be empty.'); return; }
  const p = getPlayer(id);
  if(!p) return;
  p.name = name;
  saveAll(); renderAll(); closeModal();
  toast('Player updated.');
}

function togglePlayerActive(id){
  const p = getPlayer(id);
  if(!p) return;
  if(p.active && state.current && (state.current.teamA.includes(id) || state.current.teamB.includes(id))){
    toast(`${p.name} is in the current match — finish or skip it first.`);
    return;
  }
  if(p.active && state.currentGeneration && state.currentGeneration.matches.some(m => m.status !== 'done' && (m.teamA.includes(id) || m.teamB.includes(id)))) {
    toast(`${p.name} is in an unfinished generation match — use "Replace" on that match instead, or finish it first.`);
    return;
  }
  p.active = !p.active;
  if(!p.active) {
    p.consecutiveSitOuts = 0;
    p.sitOutPriority = 0;
    p.waitingRounds = 0;
  }
  saveAll(); renderAll();
}

function removePlayer(id){
  if(state.current && (state.current.teamA.includes(id) || state.current.teamB.includes(id))){
    toast('Cannot remove a player who is in the current match.'); return;
  }
  if(state.currentGeneration && state.currentGeneration.matches.some(m => m.status !== 'done' && (m.teamA.includes(id) || m.teamB.includes(id)))) {
    toast('Cannot remove a player who is in an unfinished generation match.'); return;
  }
  const p = getPlayer(id);
  state.players = state.players.filter(pl=>pl.id!==id);
  state.players.forEach(pl=>{ delete pl.teammates[id]; delete pl.opponents[id]; });
  saveAll(); renderAll(); closeModal();
  if(p) toast(`Removed ${p.name}.`);
}

function resetPlayersAndStats(){
  state.players.forEach(p=>{
    p.gamesPlayed=0; p.wins=0; p.losses=0; p.rating=1000; p.currentStreak=0; p.longestStreak=0; p.sitOuts=0; p.consecutiveSitOuts=0; p.sitOutPriority=0; p.waitingRounds=0; p.results=[]; p.teammates={}; p.opponents={};
  });
  state.matches = [];
  state.current = null;
  state.currentGeneration = null;
  state.round = 0;
  state.undo = null;
  saveAll(); renderAll(); closeModal();
  toast('Player stats and history have been reset.');
}

function resetEverything(){
  state = { players:[], matches:[], current:null, currentGeneration:null, settings:{...DEFAULT_SETTINGS}, round:0, undo:null, tab:'match' };
  saveAll(); renderAll(); closeModal();
  toast('All data has been cleared.');
}

/* ============================================================
   MATCHMAKING ALGORITHM
   ============================================================ */
function activePlayers(){
  return state.players.filter(p=>p.active);
}

function selectionPool(){
  const pool = activePlayers().slice();
  pool.forEach(p=>{ p._jitter = Math.random(); });
  pool.sort((a,b)=>{
    if(a.gamesPlayed !== b.gamesPlayed) return a.gamesPlayed - b.gamesPlayed;
    if(a.consecutiveSitOuts !== b.consecutiveSitOuts) return b.consecutiveSitOuts - a.consecutiveSitOuts;
    if(a.sitOuts !== b.sitOuts) return b.sitOuts - a.sitOuts;
    return a._jitter - b._jitter;
  });
  return pool;
}

function combinations(arr, k){
  const out = [];
  function go(start, chosen){
    if(chosen.length===k){ out.push(chosen.slice()); return; }
    for(let i=start;i<arr.length;i++){ chosen.push(arr[i]); go(i+1, chosen); chosen.pop(); }
  }
  go(0, []);
  return out;
}

function scoreSplit(four, settings){
  const [a,b,c,d] = four;
  const splits = [ [[a,b],[c,d]], [[a,c],[b,d]], [[a,d],[b,c]] ];
  let best = null;
  splits.forEach(([t1,t2])=>{
    const teammatePenalty = pairCount(t1[0].teammates, t1[1].id) + pairCount(t2[0].teammates, t2[1].id);
    const opponentPenalty = pairCount(t1[0].opponents, t2[0].id) + pairCount(t1[0].opponents, t2[1].id) + pairCount(t1[1].opponents, t2[0].id) + pairCount(t1[1].opponents, t2[1].id);
    const skillDiff = Math.abs((t1[0].rating + t1[1].rating) - (t2[0].rating + t2[1].rating));
    const score = (teammatePenalty * 300) + (opponentPenalty * 100) + (skillDiff * 0.5);
    if(best===null || score < best.score){ best = { split:[t1,t2], score }; }
  });
  return best;
}

function nextRotationMatch(){
  const pool = selectionPool();
  if(pool.length < 4){ toast('Need at least 4 active players.'); return; }
  const four = pool.slice(0,4);
  const best = scoreSplit(four, state.settings);
  const [[p1,p2],[p3,p4]] = best.split;
  state.current = { round: state.round + 1, teamA: [p1.id, p2.id], teamB: [p3.id, p4.id] };
  state.players.forEach(p=>{
    if(p.active){
      if(state.current.teamA.includes(p.id) || state.current.teamB.includes(p.id)){ p.consecutiveSitOuts = 0; }
      else { p.sitOuts++; p.consecutiveSitOuts++; }
    }
  });
  saveAll(); renderAll();
}

/* ============================================================
   ROUND ROBIN MODE ALGORITHM & LOGIC (full-round queue engine)
   ------------------------------------------------------------
   A "generation" always schedules every match needed to play
   every active player exactly once that round (floor(active/4)
   matches) — regardless of how many physical courts you have.
   With 1 court, those matches simply queue up as "Up Next" and
   feed onto the court one at a time as each one finishes, so
   you can always see who's playing next. Once every match in a
   generation is finished, the next generation is auto-built:
   winners are grouped with winners and losers with losers
   (when that setting is on), while still balancing total games
   played and avoiding repeat teammates/opponents wherever the
   pool allows. Players who didn't fit a foursome sit out for
   exactly one generation and get top priority next time.
   ============================================================ */

function buildBalancedMatchups(group){
  // group.length should be a multiple of 4; any remainder is left unmatched by the caller.
  const matches = [];
  for(let i=0; i + 4 <= group.length; i += 4){
    const four = group.slice(i, i + 4);
    const best = scoreSplit(four, state.settings);
    const [[a,b],[c,d]] = best.split;
    matches.push({ teamA:[a.id,b.id], teamB:[c.id,d.id] });
  }
  return matches;
}

// Pull players from `donor` (lowest scheduling priority first, since donor is
// already fairness-sorted) until `group`'s length is a clean multiple of 4.
function topUpToMultipleOf4(group, donor){
  while(group.length % 4 !== 0 && donor.length){
    group.push(donor.shift());
  }
  return group;
}

function generateRoundRobinGeneration() {
  const activeList = activePlayers().slice();
  if(activeList.length < 4) { toast('Need at least 4 active players for Round Robin.'); return; }

  activeList.forEach(p => {
    p._jitter = Math.random();
    if(p.sitOutPriority === undefined) p.sitOutPriority = 0;
    if(p.waitingRounds === undefined) p.waitingRounds = 0;
  });

  // Fairness sort: fewest games played first, then longest-waiting sit-outs,
  // then lowest history of repeat pairings against the rest of the active pool, then a coin-flip.
  activeList.sort((a,b) => {
    if(a.gamesPlayed !== b.gamesPlayed) return a.gamesPlayed - b.gamesPlayed;
    if(a.sitOutPriority !== b.sitOutPriority) return b.sitOutPriority - a.sitOutPriority;
    if(a.waitingRounds !== b.waitingRounds) return b.waitingRounds - a.waitingRounds;
    let totalRepA = 0, totalRepB = 0;
    activeList.forEach(other => {
      if(other.id !== a.id) totalRepA += (a.teammates[other.id]||0) + (a.opponents[other.id]||0);
      if(other.id !== b.id) totalRepB += (b.teammates[other.id]||0) + (b.opponents[other.id]||0);
    });
    if(totalRepA !== totalRepB) return totalRepA - totalRepB;
    return a._jitter - b._jitter;
  });

  // If every active player has already partnered or opposed every other active
  // player, the matchup matrix is exhausted — reset it so pairings can repeat fairly
  // instead of the algorithm getting stuck.
  let allExhausted = true;
  exhaustCheck:
  for(let i=0; i<activeList.length; i++){
    for(let j=i+1; j<activeList.length; j++){
      const pI = activeList[i], pJ = activeList[j];
      if((pI.teammates[pJ.id]||0) === 0 && (pI.opponents[pJ.id]||0) === 0){ allExhausted = false; break exhaustCheck; }
    }
  }
  if(allExhausted){
    state.players.forEach(p => { p.teammates = {}; p.opponents = {}; });
    toast('All combinations played at least once — matchup history reset for a fresh rotation.');
  }

  // Schedule EVERY foursome the active roster supports this generation (not capped by court count).
  const matchCount = Math.floor(activeList.length / 4);
  const playersNeeded = matchCount * 4;
  const playingPlayers = activeList.slice(0, playersNeeded);
  const sittingPlayers = activeList.slice(playersNeeded);

  let matchups = [];

  // Winner-vs-winner / Loser-vs-loser bucketing, based on the generation that just finished.
  if(state.settings.winnerVsWinner && state.round > 0){
    const lastGenMatches = state.matches.filter(m => m.generation === state.round);
    if(lastGenMatches.length){
      const lastWinners = new Set(), lastLosers = new Set();
      lastGenMatches.forEach(m => {
        m.winners.forEach(id => lastWinners.add(id));
        m.losers.forEach(id => lastLosers.add(id));
      });

      // playingPlayers is already fairness-sorted; preserve that order within each bucket.
      const winnersGroup = playingPlayers.filter(p => lastWinners.has(p.id));
      const losersGroup  = playingPlayers.filter(p => lastLosers.has(p.id));
      const freshGroup   = playingPlayers.filter(p => !lastWinners.has(p.id) && !lastLosers.has(p.id)); // subbed in / previously sitting

      // Round each bucket up to a clean foursome multiple using the fairness-sorted "fresh" pool
      // (newcomers / former sit-outs) before resorting to splitting buckets apart.
      topUpToMultipleOf4(winnersGroup, freshGroup);
      topUpToMultipleOf4(losersGroup, freshGroup);

      matchups = matchups.concat(buildBalancedMatchups(winnersGroup));
      matchups = matchups.concat(buildBalancedMatchups(losersGroup));
      matchups = matchups.concat(buildBalancedMatchups(freshGroup));

      // Anyone left over (a bucket had an unresolvable remainder) gets matched directly.
      const consumed = new Set();
      matchups.forEach(m => { m.teamA.forEach(id=>consumed.add(id)); m.teamB.forEach(id=>consumed.add(id)); });
      const leftover = playingPlayers.filter(p => !consumed.has(p.id));
      matchups = matchups.concat(buildBalancedMatchups(leftover));
    }
  }

  if(!matchups.length){
    matchups = buildBalancedMatchups(playingPlayers);
  }

  const numCourts = clamp(parseInt(state.settings.numCourts,10)||1, 1, 10);
  const genId = state.round + 1;
  const matches = matchups.map((m, idx) => ({
    id: uid('gm'),
    matchIndex: idx,
    teamA: m.teamA, teamB: m.teamB,
    scoreA: null, scoreB: null, winner: null,
    status: idx < numCourts ? 'active' : 'queued',
    court: idx < numCourts ? idx + 1 : null
  }));

  // Only players truly left out of every match this generation sit out / earn priority.
  const playingIds = new Set();
  matches.forEach(m => { m.teamA.forEach(id=>playingIds.add(id)); m.teamB.forEach(id=>playingIds.add(id)); });
  state.players.forEach(p => {
    if(!p.active) return;
    if(playingIds.has(p.id)){
      p.consecutiveSitOuts = 0; p.sitOutPriority = 0; p.waitingRounds = 0;
    } else {
      p.sitOuts++;
      p.consecutiveSitOuts = (p.consecutiveSitOuts||0) + 1;
      p.sitOutPriority = (p.sitOutPriority||0) + 5;
      p.waitingRounds = (p.waitingRounds||0) + 1;
    }
  });

  state.currentGeneration = {
    generation: genId,
    matches: matches,
    sittingOut: sittingPlayers.map(p => p.id)
  };
  state.current = null;
  saveAll(); renderAll();
  toast(`Generation ${genId}: ${matches.length} match${matches.length===1?'':'es'} scheduled across ${Math.min(numCourts, matches.length)} court${Math.min(numCourts, matches.length)===1?'':'s'}.`);
}

// Pulls the next queued match(es) onto any court that just freed up.
function advanceRRQueue(){
  const gen = state.currentGeneration;
  if(!gen) return;
  const numCourts = clamp(parseInt(state.settings.numCourts,10)||1, 1, 10);
  const usedCourts = new Set(gen.matches.filter(m => m.status === 'active').map(m => m.court));
  const queued = gen.matches.filter(m => m.status === 'queued').sort((a,b) => a.matchIndex - b.matchIndex);
  for(let c = 1; c <= numCourts && queued.length; c++){
    if(usedCourts.has(c)) continue;
    const next = queued.shift();
    next.status = 'active';
    next.court = c;
  }
}

function selectRoundRobinWinner(matchId, winningTeam) {
  const gen = state.currentGeneration;
  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);
  if(!m || m.status === 'done') return;
  m.winner = winningTeam;
  if(m.scoreA === null && m.scoreB === null){
    m.scoreA = winningTeam === 'A' ? 11 : 8;
    m.scoreB = winningTeam === 'A' ? 8 : 11;
  }
  saveAll(); renderAll();
}

function updateRRMatchScore(matchId, team, val){
  const gen = state.currentGeneration;
  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);
  if(!m || m.status === 'done') return;
  const num = parseInt(val, 10);
  if(isNaN(num)) return;
  if(team === 'A') m.scoreA = num; else m.scoreB = num;
  saveAll();
}

// Finalizes a single court's result immediately (stats, rating, history),
// frees its court, pulls the next queued match onto it, and — once every
// match in the generation is done — auto-builds the next generation.
function confirmRoundRobinMatch(matchId){
  const gen = state.currentGeneration;
  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);
  if(!m || m.status === 'done') return;
  if(m.winner === null){ toast('Select the winning team before confirming.'); return; }

  state.undo = {
    players: deepClone(state.players),
    matches: deepClone(state.matches),
    current: null,
    currentGeneration: deepClone(state.currentGeneration),
    round: state.round
  };

  const sA = parseInt(m.scoreA, 10) || 0;
  const sB = parseInt(m.scoreB, 10) || 0;
  const tA_win = m.winner === 'A';

  const matchRecord = {
    id: uid('m'),
    round: gen.generation,
    generation: gen.generation,
    court: m.court || 0,
    teamA: m.teamA, teamB: m.teamB,
    scoreA: sA, scoreB: sB,
    winners: tA_win ? m.teamA : m.teamB,
    losers: tA_win ? m.teamB : m.teamA,
    date: new Date().toISOString()
  };
  state.matches.push(matchRecord);

  [...m.teamA, ...m.teamB].forEach(id => {
    const p = getPlayer(id);
    if(!p) return;
    p.gamesPlayed++;
    if(matchRecord.winners.includes(id)){
      p.wins++; p.results.push('W'); p.currentStreak = p.currentStreak > 0 ? p.currentStreak + 1 : 1;
    } else {
      p.losses++; p.results.push('L'); p.currentStreak = p.currentStreak < 0 ? p.currentStreak - 1 : -1;
    }
    if(Math.abs(p.currentStreak) > p.longestStreak) p.longestStreak = Math.abs(p.currentStreak);
  });

  [[m.teamA[0], m.teamA[1]], [m.teamB[0], m.teamB[1]]].forEach(([p1, p2]) => {
    const pl1 = getPlayer(p1), pl2 = getPlayer(p2);
    if(pl1 && pl2){ bumpPair(pl1.teammates, p2); bumpPair(pl2.teammates, p1); }
  });
  m.teamA.forEach(idA => {
    m.teamB.forEach(idB => {
      const plA = getPlayer(idA), plB = getPlayer(idB);
      if(plA && plB){ bumpPair(plA.opponents, idB); bumpPair(plB.opponents, idA); }
    });
  });

  const rA = (getPlayer(m.teamA[0])?.rating || 1000) + (getPlayer(m.teamA[1])?.rating || 1000);
  const rB = (getPlayer(m.teamB[0])?.rating || 1000) + (getPlayer(m.teamB[1])?.rating || 1000);
  const expA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
  const ratingChange = Math.round(32 * ((tA_win ? 1 : 0) - expA));
  m.teamA.forEach(id => { const p = getPlayer(id); if(p) p.rating += ratingChange; });
  m.teamB.forEach(id => { const p = getPlayer(id); if(p) p.rating -= ratingChange; });

  m.status = 'done';
  m.court = null;

  advanceRRQueue();

  const allDone = gen.matches.every(x => x.status === 'done');
  if(allDone){
    state.round = gen.generation;
    state.currentGeneration = null;
    saveAll();
    toast(`Generation ${gen.generation} complete — building the next generation…`);
    generateRoundRobinGeneration();
  } else {
    saveAll(); renderAll();
    toast('Match recorded — next match is up.');
  }
}

function openReplacePlayerPickerModal(matchId){

  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);

  const rows = [
    { team:'A', id:m.teamA[0] }, { team:'A', id:m.teamA[1] },

function openReplacePlayerModal(matchId, team, playerId){
  const gen = state.currentGeneration;
  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);
  if(!m || m.status === 'done'){ toast('That match is already finished.'); return; }
  const p = getPlayer(playerId);

  const benchPlayers = (gen.sittingOut || [])
    .filter(id => id !== playerId)
    .map(id => getPlayer(id))
    .filter(Boolean)
    .sort((a,b) => a.gamesPlayed - b.gamesPlayed);

  const benchHtml = benchPlayers.length
    ? benchPlayers.map(b => `
        <button class="btn btn-secondary btn-block" style="margin-top:6px; justify-content:space-between;" data-action="do-replace-manual" data-match="${matchId}" data-team="${team}" data-player="${playerId}" data-sub="${b.id}">
          <span>${esc(b.name)}</span><span class="mono" style="color:var(--text-faint); font-size:11px;">${b.gamesPlayed} gms played</span>
        </button>
      `).join('')
    : `<p class="helper-text">No one is currently sitting out to substitute in. Mark them absent below to bench this match's slot instead.</p>`;

  openModal(`
    <div class="modal-title">Replace ${esc(p ? p.name : 'Player')}</div>
    <div class="modal-sub">Not around? Pick a bench player to sub in for this match — the rest of the queue stays balanced automatically.</div>
    <button class="btn btn-danger btn-block" data-action="do-replace-absent" data-match="${matchId}" data-team="${team}" data-player="${playerId}">Mark Absent &amp; Auto-Sub Best Available</button>
    ${benchPlayers.length ? '<div class="divider-thin"></div><div class="helper-text" style="margin-bottom:0;">Or choose manually:</div>' : '<div class="divider-thin"></div>'}
    ${benchHtml}
    <div class="modal-actions">
      <button class="btn btn-ghost btn-block" data-action="modal-close">Cancel</button>
    </div>
  `);
}

function replacePlayerInMatch(matchId, team, oldId, newId){
  if(!newId){ toast('No substitute selected.'); return; }
  const gen = state.currentGeneration;
  if(!gen) return;
  const m = gen.matches.find(x => x.id === matchId);
  if(!m || m.status === 'done'){ toast('That match is already finished.'); return; }
  const teamArr = team === 'A' ? m.teamA : m.teamB;
  const idx = teamArr.indexOf(oldId);
  if(idx === -1) return;

  teamArr[idx] = newId;
  gen.sittingOut = (gen.sittingOut || []).filter(id => id !== newId);
  const oldPlayer = getPlayer(oldId);
  if(oldPlayer && oldPlayer.active && !gen.sittingOut.includes(oldId)){
    gen.sittingOut.push(oldId);
  }
  saveAll(); renderAll(); closeModal();
  toast(`${oldPlayer ? oldPlayer.name : 'Player'} swapped out for ${playerName(newId)}.`);
}

function markPlayerAbsentAndAutoReplace(matchId, team, oldId){
  const gen = state.currentGeneration;
  if(!gen) return;
  const oldPlayer = getPlayer(oldId);
  if(oldPlayer) oldPlayer.active = false; // they're not around — pause their profile so they're not scheduled again
  gen.sittingOut = (gen.sittingOut || []).filter(id => id !== oldId);

  const candidates = (gen.sittingOut || []).map(id => getPlayer(id)).filter(Boolean).sort((a,b) => a.gamesPlayed - b.gamesPlayed);
  if(!candidates.length){
    saveAll(); renderAll(); closeModal();
    toast(`${oldPlayer ? oldPlayer.name : 'Player'} marked absent — no bench player available, that slot is open until someone subs in.`);
    return;
  }
  replacePlayerInMatch(matchId, team, oldId, candidates[0].id);
}

/* ============================================================
   MATCH FINALIZATION (ROTATION ORIGINAL SYSTEM)
   ============================================================ */
function recordRotationMatch(scoreA, scoreB) {
  if(!state.current) return;
  const sA = parseInt(scoreA,10);
  const sB = parseInt(scoreB,10);
  if(isNaN(sA) || isNaN(sB)) { toast('Enter valid scores for both teams.'); return; }

  state.undo = {
    players: deepClone(state.players),
    matches: deepClone(state.matches),
    current: deepClone(state.current),
    currentGeneration: null,
    round: state.round
  };

  const curr = state.current;
  state.round = curr.round;

  const matchRecord = {
    id: uid('m'),
    round: curr.round,
    teamA: curr.teamA,
    teamB: curr.teamB,
    scoreA: sA,
    scoreB: sB,
    winners: sA > sB ? curr.teamA : curr.teamB,
    losers: sA > sB ? curr.teamB : curr.teamA,
    date: new Date().toISOString()
  };

  state.matches.push(matchRecord);

  const allFour = [...curr.teamA, ...curr.teamB];
  allFour.forEach(id => {
    const p = getPlayer(id);
    if(!p) return;
    p.gamesPlayed++;
    if(matchRecord.winners.includes(id)) {
      p.wins++; p.results.push('W');
      p.currentStreak = p.currentStreak > 0 ? p.currentStreak + 1 : 1;
    } else {
      p.losses++; p.results.push('L');
      p.currentStreak = p.currentStreak < 0 ? p.currentStreak - 1 : -1;
    }
    if(Math.abs(p.currentStreak) > p.longestStreak) p.longestStreak = Math.abs(p.currentStreak);
  });

  const pairs = [[curr.teamA[0], curr.teamA[1]], [curr.teamB[0], curr.teamB[1]]];
  pairs.forEach(([p1, p2]) => {
    const pl1 = getPlayer(p1), pl2 = getPlayer(p2);
    if(pl1 && pl2) { bumpPair(pl1.teammates, p2); bumpPair(pl2.teammates, p1); }
  });

  curr.teamA.forEach(idA => {
    curr.teamB.forEach(idB => {
      const plA = getPlayer(idA), plB = getPlayer(idB);
      if(plA && plB) { bumpPair(plA.opponents, idB); bumpPair(plB.opponents, idA); }
    });
  });

  const rA = (getPlayer(curr.teamA[0])?.rating || 1000) + (getPlayer(curr.teamA[1])?.rating || 1000);
  const rB = (getPlayer(curr.teamB[0])?.rating || 1000) + (getPlayer(curr.teamB[1])?.rating || 1000);
  const expA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
  const actualA = sA > sB ? 1 : 0;
  const ratingChange = Math.round(32 * (actualA - expA));

  curr.teamA.forEach(id => { const p = getPlayer(id); if(p) p.rating += ratingChange; });
  curr.teamB.forEach(id => { const p = getPlayer(id); if(p) p.rating -= ratingChange; });

  state.current = null;
  saveAll(); renderAll();
  toast('Match score recorded.');
}

function skipCurrentMatch() {
  if(!state.current && !state.currentGeneration) return;
  if(state.settings.matchMode === 'RoundRobin') {
    state.currentGeneration = null;
  } else {
    state.current = null;
  }
  saveAll(); renderAll();
  toast('Current match setup cleared/skipped.');
}

function undoLastMatch() {
  if(!state.undo) { toast('Nothing to undo.'); return; }
  state.players = state.undo.players;
  state.matches = state.undo.matches;
  state.current = state.undo.current;
  state.currentGeneration = state.undo.currentGeneration;
  state.round = state.undo.round;
  state.undo = null;
  saveAll(); renderAll();
  toast('Last match results undone.');
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportData(){
  const dump = {
    players: state.players,
    matches: state.matches,
    current: state.settings.matchMode === 'RoundRobin' ? state.currentGeneration : state.current,
    settings: state.settings,
    round: state.round,
    version: '2.0-multi-mode'
  };
  const str = JSON.stringify(dump, null, 2);
  const blob = new Blob([str], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kitchen_ladder_export_${Date.now().toString(36)}.json`;
  a.click();
  toast('Data file downloaded.');
}

function importDataFromText(txt){
  try{
    const dump = JSON.parse(txt);
    if(!dump || !Array.isArray(dump.players)) { toast('Invalid schema format structure.'); return; }
    state.players = dump.players;
    state.matches = dump.matches || [];
    state.settings = { ...DEFAULT_SETTINGS, ...dump.settings };
    state.round = parseInt(dump.round,10)||0;
    
    const incomingC = dump.current;
    if (incomingC && incomingC.matches) {
      state.currentGeneration = incomingC;
      state.current = null;
    } else {
      state.current = incomingC;
      state.currentGeneration = null;
    }

    state.undo = null;
    saveAll(); renderAll(); closeModal();
    toast('Database restored correctly.');
  }catch(e){
    toast('Parsing failure: verify copied content.');
  }
}

function renderQueueView(el){
  const activeList = activePlayers().slice();
  
  // Sort properly for clear inspection presentation layout
  activeList.forEach(p => {
    if(p.sitOutPriority === undefined) p.sitOutPriority = 0;
    if(p.waitingRounds === undefined) p.waitingRounds = 0;
  });

  // Presentation priority matches requirements index ordering layout sorting definitions
  activeList.sort((a,b) => {
    if(a.gamesPlayed !== b.gamesPlayed) return a.gamesPlayed - b.gamesPlayed;
    if(b.sitOutPriority !== a.sitOutPriority) return b.sitOutPriority - a.sitOutPriority;
    if(b.waitingRounds !== a.waitingRounds) return b.waitingRounds - a.waitingRounds;
    return a.name.localeCompare(b.name);
  });

  if(!activeList.length){
    el.innerHTML = `<div class="empty-state"><div class="big">👥</div><p>No active players currently in line.</p></div>`;
    return;
  }

  el.innerHTML = `
    <div class="section-title">Queue Priority Rankings</div>
    <div class="card" style="padding:10px 4px;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="padding-left:12px; width:60px;">Priority</th>
              <th>Player</th>
              <th style="text-align:center;">Games</th>
              <th style="text-align:center;">Con. Sit</th>
              <th style="text-align:center;">Sit Pri</th>
              <th style="text-align:center;">Wait Rnds</th>
            </tr>
          </thead>
          <tbody>
            ${activeList.map((p, idx) => `
              <tr>
                <td style="padding-left:12px;"><span class="qrank">${idx+1}</span></td>
                <td class="namecell"><strong>${esc(p.name)}</strong></td>
                <td style="text-align:center;">${p.gamesPlayed}</td>
                <td style="text-align:center; color:var(--loss); font-weight:bold;">${p.consecutiveSitOuts || 0}</td>
                <td style="text-align:center; color:var(--court);">${p.sitOutPriority || 0}</td>
                <td style="text-align:center; color:var(--ball);">${p.waitingRounds || 0}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderPlayersView(el){
  const total = state.players.length;
  let html = `
    <div class="card" style="margin-bottom:16px;">
      <div class="field">
        <label>Add New Player</label>
        <div class="input-row">
          <input type="text" id="newPlayerName" placeholder="Enter name…">
          <button class="btn btn-primary" data-action="do-add-player">Add</button>
        </div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-ghost btn-sm btn-block" data-action="open-bulk-import">Bulk Import Names</button>
      </div>
    </div>
    <div class="section-title">All Registered Athletes (${total})</div>
  `;

  if(!total){
    html += `<div class="empty-state"><div class="big">🗂️</div><p>No players available. Add some above to get going!</p></div>`;
    el.innerHTML = html;
    return;
  }

  // Sort by active status, then alphabetically
  const sorted = state.players.slice().sort((a,b)=>{
    if(a.active !== b.active) return b.active ? 1 : -1;
    return a.name.localeCompare(b.name);
  });

  html += '<div class="card" style="padding:6px 12px;">';
  sorted.forEach(p=>{
    html += `
      <div class="player-row">
        <div class="avatar">${initials(p.name)}</div>
        <div class="pinfo">
          <div class="pname">${esc(p.name)}</div>
          <div class="pmeta">${p.gamesPlayed} Games · Rating: ${p.rating}</div>
        </div>
        <div class="row-actions">
          <button class="pill ${p.active?'pill-active':'pill-paused'}" data-action="toggle-active" data-id="${p.id}">
            ${p.active?'Active':'Paused'}
          </button>
          <button class="icon-btn" data-action="open-edit-player" data-id="${p.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </div>
    `;
  });
  html += '</div>';
  el.innerHTML = html;
}

let rankSort = 'rating';
function renderRankingsView(el){
  let pool = state.players.slice();
  
  pool.sort((a,b)=>{
    if(rankSort === 'rating') return b.rating - a.rating;
    if(rankSort === 'winpct') return winPct(b) - winPct(a);
    if(rankSort === 'games') return b.gamesPlayed - a.gamesPlayed;
    return b.rating - a.rating;
  });

  el.innerHTML = `
    <div class="section-title">Ladder Rankings</div>
    <div class="sort-bar scroll-hide">
      <div class="sort-chip ${rankSort==='rating'?'active':''}" data-action="rank-sort" data-sort="rating">By Rating (Elo)</div>
      <div class="sort-chip ${rankSort==='winpct'?'active':''}" data-action="rank-sort" data-sort="winpct">By Win %</div>
      <div class="sort-chip ${rankSort==='games'?'active':''}" data-action="rank-sort" data-sort="games">By Games Played</div>
    </div>

    <div class="card" style="padding:10px 4px;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="padding-left:12px; width:46px;">Rank</th>
              <th>Player</th>
              <th style="text-align:center;">Games</th>
              <th style="text-align:center;">W - L</th>
              <th style="text-align:center;">Win %</th>
              <th style="text-align:center;">Rating</th>
              <th style="text-align:center;">Streak</th>
              <th style="text-align:center; padding-right:12px;">Sit Out</th>
            </tr>
          </thead>
          <tbody>
            ${pool.map((p, idx)=> {
              const strK = p.currentStreak || 0;
              let streakClass = 'streak-0';
              let streakTxt = '—';
              if(strK > 0) { streakClass = 'streak-w'; streakTxt = `W${strK}`; }
              else if(strK < 0) { streakClass = 'streak-l'; streakTxt = `L${Math.abs(strK)}`; }

              return `
                <tr class="rank-${idx+1}">
                  <td style="padding-left:12px;" class="rankbadge">${idx+1}</td>
                  <td class="namecell"><strong>${esc(p.name)}</strong></td>
                  <td style="text-align:center;">${p.gamesPlayed}</td>
                  <td style="text-align:center; font-size:11.5px; color:var(--text-dim);">${p.wins} - ${p.losses}</td>
                  <td style="text-align:center;" class="txt-win">${winPct(p)}%</td>
                  <td style="text-align:center; font-weight:700; color:var(--ball);">${p.rating}</td>
                  <td style="text-align:center;"><span class="streak-chip ${streakClass}">${streakTxt}</span></td>
                  <td style="text-align:center; padding-right:12px; color:var(--text-faint);">${p.sitOuts || 0}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderStatsView(el){
  if(!state.players.length){
    el.innerHTML = `<div class="empty-state"><div class="big">📊</div><p>No players recorded yet.</p></div>`;
    return;
  }

  let html = `<div class="section-title">Advanced Metrics Explorer</div>`;

  state.players.forEach(p => {
    // Determine highest frequency/common teammates and opponents safely
    let tmPairs = Object.entries(p.teammates || {}).map(([id, c]) => ({ name: playerName(id), count: c }));
    tmPairs.sort((a,b) => b.count - a.count);
    let topTeammates = tmPairs.slice(0,2).map(x => `${x.name} (${x.count}x)`).join(', ') || 'None';

    let opPairs = Object.entries(p.opponents || {}).map(([id, c]) => ({ name: playerName(id), count: c }));
    opPairs.sort((a,b) => b.count - a.count);
    let topOpponents = opPairs.slice(0,2).map(x => `${x.name} (${x.count}x)`).join(', ') || 'None';

    html += `
      <div class="card" style="margin-bottom:12px;">
        <div style="font-weight:800; font-size:15px; color:var(--ball); margin-bottom:8px;">${esc(p.name)}</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="sv">${p.wins}</div><div class="sl">Wins</div></div>
          <div class="stat-box"><div class="sv">${p.losses}</div><div class="sl">Losses</div></div>
          <div class="stat-box"><div class="sv" style="color:var(--court);">${p.longestStreak||0}</div><div class="sl">Max Streak</div></div>
        </div>
        <div class="stat-grid" style="margin-top:8px;">
          <div class="stat-box"><div class="sv" style="color:var(--text-dim);">${p.sitOuts || 0}</div><div class="sl">Total Sits</div></div>
          <div class="stat-box"><div class="sv" style="color:var(--loss);">${p.consecutiveSitOuts || 0}</div><div class="sl">Con. Sits</div></div>
          <div class="stat-box"><div class="sv" style="color:var(--text-faint);">${p.rating}</div><div class="sl">Elo Score</div></div>
        </div>
        <div style="margin-top:10px; font-size:12px; line-height:1.4; color:var(--text-dim); border-top:1px solid var(--line-soft); padding-top:8px;">
          <div><strong>Common Teammates:</strong> ${esc(topTeammates)}</div>
          <div style="margin-top:3px;"><strong>Common Opponents:</strong> ${esc(topOpponents)}</div>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
}

function renderHistoryView(el){
  let matches = state.matches.slice().reverse();

  let html = `
    <div class="card" style="margin-bottom:12px; padding:10px 14px;">
      <input type="text" id="histSearch" placeholder="🔍 Search player name history matches…" style="font-size:14px; padding:8px 12px;">
    </div>
    <div class="section-title">Completed Matches Logs (${matches.length})</div>
  `;

  if(!matches.length){
    html += `<div class="empty-state"><div class="big">🗓️</div><p>No historical items recorded yet.</p></div>`;
    el.innerHTML = html;
    return;
  }

  html += '<div id="histItemsContainer">';
  matches.forEach(m => {
    const pA1 = playerName(m.teamA[0]), pA2 = playerName(m.teamA[1]);
    const pB1 = playerName(m.teamB[0]), pB2 = playerName(m.teamB[1]);
    const isGen = m.generation !== undefined;

    html += `
      <div class="hist-item" data-search-string="${esc(pA1.toLowerCase())} ${esc(pA2.toLowerCase())} ${esc(pB1.toLowerCase())} ${esc(pB2.toLowerCase())}">
        <div class="hist-top">
          <span class="hist-round">${isGen ? `Generation ${m.generation} · Court ${m.court||1}` : `Match #${m.round}`}</span>
          <span class="hist-round" style="color:var(--text-faint);">${fmtDate(m.date)}</span>
        </div>
        <div class="hist-teams">
          <div class="hist-team ${m.scoreA > m.scoreB ? 'winner' : 'loser'}">${esc(pA1)} / ${esc(pA2)}</div>
          <div class="hist-vs mono">${m.scoreA}-${m.scoreB}</div>
          <div class="hist-team ${m.scoreB > m.scoreA ? 'winner' : 'loser'}">${esc(pB1)} / ${esc(pB2)}</div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  el.innerHTML = html;

  // Live filter lookup binding seamlessly without full structural invalidation
  const input = document.getElementById('histSearch');
  if(input) {
    input.addEventListener('input', function(e){
      const q = e.target.value.toLowerCase().trim();
      const rows = document.querySelectorAll('#histItemsContainer .hist-item');
      rows.forEach(r => {
        const str = r.dataset.searchString || '';
        if(!q || str.includes(q)) r.style.display = 'block';
        else r.style.display = 'none';
      });
    });
  }
}

      <p class="helper-text" style="margin-top:0;">Wipe stats or start completely fresh. These actions can't be undone.</p>
      <button class="btn btn-danger btn-block" data-action="open-danger-zone">Clear / Reset Options</button>
    </div>
  `;
}

function saveSettingsFromForm(){
  const numCourtsVal = document.getElementById('numCourtsInput') ? parseInt(document.getElementById('numCourtsInput').value, 10) || 1 : 1;
  const winnerVsWinnerVal = document.getElementById('winnerVsWinnerToggle') ? document.getElementById('winnerVsWinnerToggle').checked : true;
  const equalPlayVal = document.getElementById('equalPlayToggle') ? document.getElementById('equalPlayToggle').checked : true;
  const smartBalanceVal = document.getElementById('smartBalanceToggle') ? document.getElementById('smartBalanceToggle').checked : true;

  state.settings.numCourts = numCourtsVal;
  state.settings.winnerVsWinner = winnerVsWinnerVal;
  state.settings.equalPlayPriority = equalPlayVal;
  state.settings.smartBalance = smartBalanceVal;

  if(state.currentGeneration) advanceRRQueue(); // pick up newly-freed courts right away if the count went up

  saveAll(); renderAll();
  toast('System parameters saved correctly.');
}

/* ============================================================
   GLOBAL CAPTURE DELEGATED CLICK ROUTERS EVENT DISPATCHER
   ============================================================ */
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;

  switch(action){
    case 'tab':
      state.tab = t.dataset.tab;
      saveAll(); renderAll();
      break;
    
    // Rotation workflow
    case 'next-match': nextRotationMatch(); break;
    case 'save-match-score':
      recordRotationMatch(document.getElementById('scoreA').value, document.getElementById('scoreB').value);
      break;
    
    // Round robin workflow
    case 'generate-roundrobin': generateRoundRobinGeneration(); break;
    case 'set-rr-winner':
      selectRoundRobinWinner(t.dataset.match, t.dataset.team);
      break;
    case 'confirm-rr-match': confirmRoundRobinMatch(t.dataset.match); break;
    case 'open-replace-player': openReplacePlayerModal(t.dataset.match, t.dataset.team, t.dataset.player); break;
    case 'open-replace-picker': openReplacePlayerPickerModal(t.dataset.match); break;
    case 'do-replace-absent': markPlayerAbsentAndAutoReplace(t.dataset.match, t.dataset.team, t.dataset.player); break;
    case 'do-replace-manual': replacePlayerInMatch(t.dataset.match, t.dataset.team, t.dataset.player, t.dataset.sub); break;

    // Standard shared management commands
    case 'skip-match': skipCurrentMatch(); break;
    case 'undo-match': undoLastMatch(); break;

    // Player operations logic
    case 'do-add-player':
      const inp = document.getElementById('newPlayerName');
      addPlayer(inp.value); inp.value = '';
      break;
    case 'toggle-active': togglePlayerActive(t.dataset.id); break;
    case 'open-bulk-import':
      openModal(`
        <div class="modal-title">Bulk Import Players</div>
        <div class="modal-sub">Paste name strings separated by newlines or commas.</div>
        <textarea id="bulkText" placeholder="Alice\nBob\nCharlie"></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-action="modal-close">Cancel</button>
          <button class="btn btn-primary" data-action="do-bulk-import">Import Bulk</button>
        </div>
      `);
      break;
    case 'do-bulk-import':
      bulkImport(document.getElementById('bulkText').value);
      break;
    case 'open-edit-player': {
      const p = getPlayer(t.dataset.id);
      if(p){
        openModal(`
          <div class="modal-title">Edit Name Info</div>
          <input type="text" id="editName" value="${esc(p.name)}" style="margin-top:8px;">
          <div class="modal-actions">
            <button class="btn btn-danger" data-action="do-delete-player" data-id="${p.id}">Remove Player</button>
            <button class="btn btn-primary" data-action="do-save-player" data-id="${p.id}">Save Changes</button>
          </div>
        `);
      }
      break;
    }
    case 'do-save-player': editPlayerName(t.dataset.id, document.getElementById('editName').value); break;
    case 'do-delete-player': removePlayer(t.dataset.id); break;

    case 'open-danger-zone':
      openModal(`
        <div class="modal-title" style="color:var(--loss);">Factory System Reset Options</div>
        <div class="modal-sub">Select your desired cleanup parameters method below safely.</div>
        <button class="btn btn-danger btn-block" data-action="do-reset-stats">Reset Scores &amp; Match History logs only</button>
        <button class="btn btn-danger btn-block" style="margin-top:8px;" data-action="do-reset-all">Clear everything completely from scratch</button>
        <button class="btn btn-ghost btn-block" style="margin-top:12px;" data-action="modal-close">Cancel</button>
      `);
      break;
    case 'do-reset-stats': resetPlayersAndStats(); break;
    case 'do-reset-all': resetEverything(); break;

    case 'rank-sort': rankSort = t.dataset.sort; renderRankingsView(document.getElementById('view')); break;
    case 'toggle-mode-setting':
      state.settings.matchMode = t.dataset.value;
      const wrap = document.getElementById('courts-field-wrapper');
      if(wrap) wrap.style.display = state.settings.matchMode === 'RoundRobin' ? 'block' : 'none';
      document.querySelectorAll('.radio-box-btn').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      break;
    case 'save-settings': saveSettingsFromForm(); break;
    case 'export-data': exportData(); break;
    case 'open-import-data':
      openModal(`
        <div class="modal-title">Import Exported Matrix JSON</div>
        <textarea id="importText" placeholder="Paste data backup string content here…"></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-action="modal-close">Cancel</button>
          <button class="btn btn-primary" data-action="do-import-data">Trigger Override Restore</button>
        </div>
      `);
      break;
    case 'do-import-data': importDataFromText(document.getElementById('importText').value); break;
    case 'modal-close': closeModal(); break;
  }
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
});

/* ============================================================
   SYSTEM BOOT INITIALIZER EXECUTION
   ============================================================ */
loadState();
renderAll();

})();
</script>
